org.gradle.jvmargs = -Xmx4G
# Disable the sussy daemon
org.gradle.daemon=false

# Identity
mod_name=clockwork
mod_id=vs_clockwork
mod_version=0.1.2
archives_base_name=clockwork
maven_group=org.valkyrienskies

minecraft_version = 1.18.2
enabled_platforms = forge,fabric
createbigcannons_version= 0.5.2-nightly-e815ca4
loader_platform = Fabric

# Mappings
# https://parchmentmc.org/docs/getting-started
parchment_version = 2022.11.06

# VS2
vs2_version=2.1.1-beta.4+ee9a5f30fe
vscore_version=1.1.0+ec4fe54cd6

# Fabric
# https://fabricmc.net/develop/
fabric_loader_version = 0.14.11
fabric_api_version = 0.67.0+1.18.2

# Forge
# https://files.minecraftforge.net/net/minecraftforge/forge/
forge_version = 40.2.4

# Kotlin
kotlin_version=3.12.0
fabric_language_kotlin_version = 1.10.14+kotlin.1.9.20

# Architectury
architectury_version = 4.11.93

# Create - Fabric
# https://modrinth.com/mod/create-fabric/versions
create_fabric_version = 0.5.1-c-build.1092+mc1.18.2

# Create - Forge
# https://github.com/Creators-of-Create/Create/wiki/Depending-on-Create
